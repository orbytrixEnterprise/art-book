<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Orbytrix App UI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #020617;
  color: white;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: #020617;
  padding: 15px;
  z-index: 10;
  border-bottom: 1px solid #1e293b;
}

.title {
  font-size: 1.8rem;
  font-weight: bold;
}

/* SEARCH */
.search {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #0f172a;
  color: white;
}

/* CATEGORY */
.container {
  padding: 15px;
}

.category {
  margin-bottom: 30px;
}

.category-title {
  font-size: 1.3rem;
  margin-bottom: 10px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 15px;
}

/* CARD */
.card {
  background: #0f172a;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
  position: relative;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: auto;
}

.card-title {
  padding: 5px;
  font-size: 0.8rem;
  text-align: center;
}

/* FAVORITE */
.fav {
  position: absolute;
  top: 5px;
  right: 5px;
  cursor: pointer;
}

/* VIEWER */
.viewer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100;
}

.viewer.hidden {
  display: none;
}

.viewer img {
  max-width: 100%;
  max-height: 100%;
  transition: transform 0.3s;
}

.close {
  position: absolute;
  top: 20px;
  right: 20px;
  font-size: 25px;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="header">
  <div class="title">🚀 Orbytrix</div>
  <input class="search" placeholder="Search..." oninput="searchData(this.value)">
</div>

<div class="container" id="app"></div>

<div id="viewer" class="viewer hidden">
  <span class="close" onclick="closeViewer()">✕</span>
  <img id="viewer-img">
</div>

<script>
const URL = "https://orbytrixenterprise.github.io/json/full-data.json";

let fullData = [];
let filteredData = [];
let currentImages = [];
let currentIndex = 0;

/* LOAD DATA */
async function loadData() {
  const res = await fetch(URL);
  const json = await res.json();

  fullData = json.data;
  filteredData = fullData;

  render();
}

/* RENDER */
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  filteredData.forEach(cat => {
    const div = document.createElement("div");
    div.className = "category";

    div.innerHTML = `
      <div class="category-title">${cat.icon || "📁"} ${cat.name}</div>
      <div class="grid">
        ${cat.documents.map((doc, i) => `
          <div class="card" onclick="openViewer(${i}, '${cat.slug}')">
            <img loading="lazy" src="${doc.image}">
            <div class="fav" onclick="toggleFav(event, '${doc.id}')">❤️</div>
            <div class="card-title">${doc.title}</div>
          </div>
        `).join("")}
      </div>
    `;

    app.appendChild(div);
  });
}

/* SEARCH */
function searchData(value) {
  value = value.toLowerCase();

  filteredData = fullData.map(cat => {
    const docs = cat.documents.filter(d => d.title.toLowerCase().includes(value));
    return { ...cat, documents: docs };
  });

  render();
}

/* VIEWER */
function openViewer(index, slug) {
  const cat = fullData.find(c => c.slug === slug);
  currentImages = cat.documents.map(d => d.image);
  currentIndex = index;

  document.getElementById("viewer").classList.remove("hidden");
  document.getElementById("viewer-img").src = currentImages[index];
}

function closeViewer() {
  document.getElementById("viewer").classList.add("hidden");
}

/* SWIPE SUPPORT */
let startX = 0;

document.getElementById("viewer").addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.getElementById("viewer").addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) nextImage();
  if (endX - startX > 50) prevImage();
});

function nextImage() {
  currentIndex = (currentIndex + 1) % currentImages.length;
  document.getElementById("viewer-img").src = currentImages[currentIndex];
}

function prevImage() {
  currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
  document.getElementById("viewer-img").src = currentImages[currentIndex];
}

/* FAVORITES */
function toggleFav(e, id) {
  e.stopPropagation();
  let favs = JSON.parse(localStorage.getItem("favs") || "[]");

  if (favs.includes(id)) {
    favs = favs.filter(f => f !== id);
  } else {
    favs.push(id);
  }

  localStorage.setItem("favs", JSON.stringify(favs));
}

loadData();
</script>

</body>
</html>
