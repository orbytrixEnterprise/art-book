<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Orbytrix 4D Explorer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* HEADER */
h1 {
  text-align: center;
  padding: 20px;
  font-size: 2.5rem;
  background: linear-gradient(90deg, #38bdf8, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.container {
  padding: 20px;
}

/* CATEGORY */
.category {
  margin-bottom: 30px;
  border-radius: 20px;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  box-shadow: 0 0 30px rgba(56,189,248,0.1);
  transition: 0.3s;
}

.category:hover {
  transform: scale(1.01);
  box-shadow: 0 0 50px rgba(167,139,250,0.3);
}

.category-header {
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

.category-title {
  font-size: 1.5rem;
  font-weight: bold;
}

.count {
  background: #38bdf8;
  padding: 5px 10px;
  border-radius: 10px;
  font-size: 0.8rem;
}

/* GRID */
.grid {
  margin-top: 15px;
  display: none;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 15px;
}

.grid.active {
  display: grid;
}

/* CARD */
.card {
  border-radius: 15px;
  overflow: hidden;
  position: relative;
  transition: 0.4s;
  cursor: pointer;
  background: #0f172a;
}

.card:hover {
  transform: scale(1.08);
}

/* 🔥 FIXED IMAGE */
.card img {
  width: 100%;
  height: 140px;
  object-fit: contain; /* FIX */
  background: #0f172a;
}

/* TITLE */
.card-title {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 5px;
  font-size: 0.75rem;
  background: rgba(0,0,0,0.7);
  text-align: center;
}

/* VIEWER */
.viewer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.viewer.hidden {
  display: none;
}

.viewer img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

/* CLOSE BUTTON */
.close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 30px;
  cursor: pointer;
}

/* NAVIGATION */
.nav {
  position: absolute;
  top: 50%;
  font-size: 50px;
  cursor: pointer;
  padding: 10px;
  user-select: none;
}

.prev { left: 20px; }
.next { right: 20px; }

/* LOADER */
.loader {
  text-align: center;
  margin-top: 50px;
  font-size: 1.2rem;
  color: #94a3b8;
}
</style>
</head>

<body>

<h1>🚀 Orbytrix 4D Explorer</h1>

<div class="container" id="app">
  <div class="loader">Loading...</div>
</div>

<!-- FULLSCREEN VIEWER -->
<div id="viewer" class="viewer hidden">
  <span class="close" onclick="closeViewer()">✕</span>
  <img id="viewer-img" />
  <div class="nav prev" onclick="prevImage()">‹</div>
  <div class="nav next" onclick="nextImage()">›</div>
</div>

<script>
const URL = "https://cdn.jsdelivr.net/gh/orbytrixEnterprise/json/full-data.json";

let fullData = [];
let currentImages = [];
let currentIndex = 0;

async function loadData() {
  try {
    const res = await fetch(URL);
    const json = await res.json();

    fullData = json.data;

    const app = document.getElementById("app");
    app.innerHTML = "";

    fullData.forEach(category => {

      const catDiv = document.createElement("div");
      catDiv.className = "category";

      const gridId = "grid-" + category.slug;

      catDiv.innerHTML = `
        <div class="category-header" onclick="toggle('${gridId}')">
          <div class="category-title">
            ${category.icon || "📁"} ${category.name}
          </div>
          <div class="count">${category.total_items}</div>
        </div>

        <div class="grid" id="${gridId}">
          ${category.documents.map((doc, index) => `
            <div class="card" onclick="openViewer(${index}, '${category.slug}')">
              <img src="${doc.image}" />
              <div class="card-title">${doc.title}</div>
            </div>
          `).join("")}
        </div>
      `;

      app.appendChild(catDiv);
    });

  } catch (err) {
    document.getElementById("app").innerHTML = "❌ Failed to load data";
    console.error(err);
  }
}

function toggle(id) {
  document.getElementById(id).classList.toggle("active");
}

/* VIEWER FUNCTIONS */

function openViewer(index, slug) {
  const category = fullData.find(c => c.slug === slug);
  currentImages = category.documents.map(d => d.image);
  currentIndex = index;

  document.getElementById("viewer").classList.remove("hidden");
  document.getElementById("viewer-img").src = currentImages[currentIndex];
}

function closeViewer() {
  document.getElementById("viewer").classList.add("hidden");
}

function nextImage() {
  currentIndex = (currentIndex + 1) % currentImages.length;
  document.getElementById("viewer-img").src = currentImages[currentIndex];
}

function prevImage() {
  currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
  document.getElementById("viewer-img").src = currentImages[currentIndex];
}

loadData();
</script>

</body>
</html>
